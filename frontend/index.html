<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wikipedia Chat</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    .user { text-align: right; margin: 8px 0; }
    .bot { text-align: left; margin: 8px 0; }
    .user span { background: #d1e7ff; padding: 6px 10px; border-radius: 8px; display: inline-block; }
    .bot span { background: #f0f0f0; padding: 6px 10px; border-radius: 8px; display: inline-block; }
    .refs { font-size: 0.8em; color: #666; margin-top: 4px; }
    #input-area { display: flex; gap: 8px; }
    #question { flex: 1; padding: 8px; }
    button { padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Wikipedia Chat (Magic: The Gathering)</h2>
  <div id="chat"></div>
  <div id="input-area">
    <input id="question" type="text" placeholder="Escribe tu pregunta..." />
    <button onclick="sendQuery()">Consultar</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('question');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendQuery();
    });

    function addMessage(text, type, refs = []) {
      const div = document.createElement('div');
      div.className = type;
      div.innerHTML = `<span>${text}</span>`;
      if (refs.length > 0) {
        const refDiv = document.createElement('div');
        refDiv.className = 'refs';
        refDiv.innerHTML = 'Referencias: ' + refs.map(r =>
          `<a href="${r.url}" target="_blank">${r.title}</a>, línea ${r.line}`
        ).join(' | ');
        div.appendChild(refDiv);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendQuery() {
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, 'user');
      input.value = '';
      addMessage('Consultando...', 'bot');

      try {
        const res = await fetch('/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await res.json();
        chat.removeChild(chat.lastChild);

        if (data.error) {
          addMessage('Error: ' + data.error, 'bot');
        } else {
          addMessage(data.answer, 'bot', data.references || []);
        }

      } catch (e) {
        chat.removeChild(chat.lastChild);
        addMessage('Error al conectar con el servidor.', 'bot');
      }
    }
  </script>
</body>
</html>
